<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern To-Do | Stay Organized</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"
            integrity="sha384-byToCM8SqtxsHckZk9sbPks07ZRsybMGi5FV7ftuLKV90l3zxtePUHG6m7TMRNMW"
            crossorigin="anonymous"></script>
    <style>
        /* Fallback if style.css fails or for initial load */
        :root { --bg-color: #0f172a; --text-primary: #f8fafc; }
        body { background-color: var(--bg-color); color: var(--text-primary); margin: 0; padding: 0; min-height: 100vh; font-family: 'Inter', sans-serif; }
    </style>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>My Tasks</h1>
            <p class="subtitle">Stay productive and organized.</p>
        </header>

        <section class="todo-form-container">
            <form id="todo-form" class="todo-form">
                <input type="text" id="title" class="full-width" placeholder="What needs to be done?" required>
                <input type="text" id="description" class="full-width" placeholder="Add a description..." required>
                <select id="priority">
                    <option value="low">Low Priority</option>
                    <option value="medium" selected>Medium Priority</option>
                    <option value="high">High Priority</option>
                </select>
                <input type="text" id="category" placeholder="Category (e.g., Work)" value="general">
                <button type="submit" class="btn btn-primary full-width">
                    <i data-lucide="plus"></i> Add New Task
                </button>
            </form>
        </section>

        <div id="todo-list" class="todo-list">
            <!-- Loading state or fallback -->
            <div style="text-align: center; color: var(--text-secondary); padding: 2rem;">
                <p>Loading your tasks...</p>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <h2 style="font-family: 'Outfit', sans-serif;">Edit Task</h2>
                <button class="btn-icon" onclick="closeModal()">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <form id="edit-form" class="todo-form">
                <input type="hidden" id="edit-id">
                <input type="text" id="edit-title" class="full-width" placeholder="Title" required>
                <input type="text" id="edit-description" class="full-width" placeholder="Description" required>
                <select id="edit-priority">
                    <option value="low">Low</option>
                    <option value="medium">Medium</option>
                    <option value="high">High</option>
                </select>
                <input type="text" id="edit-category" placeholder="Category" required>
                <div class="full-width" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1rem;">
                    <input type="checkbox" id="edit-completed" style="width: auto;">
                    <label for="edit-completed" style="color: var(--text-secondary);">Mark as completed</label>
                </div>
                <button type="submit" class="btn btn-primary full-width">Update Task</button>
            </form>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        const todoList = document.getElementById('todo-list');
        const todoForm = document.getElementById('todo-form');
        const editModal = document.getElementById('edit-modal');
        const editForm = document.getElementById('edit-form');

        async function fetchTodos() {
            try {
                const response = await fetch('/todos');
                const todos = await response.json();
                renderTodos(todos);
            } catch (err) {
                console.error('Failed to fetch todos:', err);
                todoList.innerHTML = '<p style="text-align:center; color:var(--danger);">Error loading tasks.</p>';
            }
        }

        function renderTodos(todos) {
            if (todos.length === 0) {
                todoList.innerHTML = `
                    <div style="text-align: center; color: var(--text-secondary); padding: 4rem 2rem; background: var(--card-bg); border-radius: 1.5rem; border: 1px dashed var(--border-color);">
                        <i data-lucide="clipboard-check" style="width: 48px; height: 48px; margin-bottom: 1rem; opacity: 0.5;"></i>
                        <p>No tasks yet. Add one above!</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            todoList.innerHTML = '';
            todos.sort((a, b) => b.id - a.id).forEach(todo => {
                const item = document.createElement('div');
                item.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                
                item.innerHTML = `
                    <div class="todo-checkbox ${todo.completed ? 'completed' : ''}" onclick="toggleComplete(${JSON.stringify(todo).replaceAll('"', '&quot;')})">
                        <i data-lucide="check"></i>
                    </div>
                    <div class="todo-content">
                        <div class="todo-title">${todo.title}</div>
                        <div class="todo-description">${todo.description}</div>
                        <div class="todo-meta">
                            <span class="badge badge-${todo.priority}">${todo.priority.charAt(0).toUpperCase() + todo.priority.slice(1)}</span>
                            <span class="badge badge-category">${todo.category}</span>
                        </div>
                    </div>
                    <div class="todo-actions">
                        <button class="btn-icon" onclick="openEditModal(${JSON.stringify(todo).replaceAll('"', '&quot;')})">
                            <i data-lucide="edit-3"></i>
                        </button>
                        <button class="btn-icon btn-danger" onclick="deleteTodo(${todo.id})">
                            <i data-lucide="trash-2"></i>
                        </button>
                    </div>
                `;
                todoList.appendChild(item);
            });
            lucide.createIcons();
        }

        async function toggleComplete(todo) {
            todo.completed = !todo.completed;
            const response = await fetch(`/todos/${todo.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(todo)
            });
            if (response.ok) fetchTodos();
        }

        function openEditModal(todo) {
            document.getElementById('edit-id').value = todo.id;
            document.getElementById('edit-title').value = todo.title;
            document.getElementById('edit-description').value = todo.description;
            document.getElementById('edit-priority').value = todo.priority;
            document.getElementById('edit-category').value = todo.category;
            document.getElementById('edit-completed').checked = todo.completed;
            editModal.style.display = 'flex';
            lucide.createIcons();
        }

        function closeModal() {
            editModal.style.display = 'none';
        }

        globalThis.onclick = (event) => {
            if (event.target == editModal) closeModal();
        };

        editForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = Number.parseInt(document.getElementById('edit-id').value);
            const todo = {
                id,
                title: document.getElementById('edit-title').value,
                description: document.getElementById('edit-description').value,
                priority: document.getElementById('edit-priority').value,
                category: document.getElementById('edit-category').value,
                completed: document.getElementById('edit-completed').checked
            };

            const response = await fetch(`/todos/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(todo)
            });

            if (response.ok) {
                closeModal();
                fetchTodos();
            }
        });

        todoForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            const titleInput = document.getElementById('title');
            const descInput = document.getElementById('description');
            const priorityInput = document.getElementById('priority');
            const categoryInput = document.getElementById('category');

            const todo = {
                id: Date.now(),
                title: titleInput.value,
                description: descInput.value,
                priority: priorityInput.value,
                category: categoryInput.value,
                completed: false
            };

            const response = await fetch('/todos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(todo)
            });

            if (response.ok) {
                titleInput.value = '';
                descInput.value = '';
                fetchTodos();
            }
        });

        async function deleteTodo(id) {
            if (confirm('Are you sure you want to delete this task?')) {
                const response = await fetch(`/todos/${id}`, { method: 'DELETE' });
                if (response.ok) fetchTodos();
            }
        }

        fetchTodos();
    </script>
</body>
</html>
