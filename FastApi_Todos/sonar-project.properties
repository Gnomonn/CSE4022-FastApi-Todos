# 프로젝트 키 및 이름
sonar.projectKey=fastapi_app
sonar.projectName=FastAPI App
sonar.projectVersion=1.0

# 소스 코드 위치 (루트 디렉토리 기준 현재 경로)
sonar.sources=.

# SonarQube 서버 URL (docker-compose로 띄운 로컬 SonarQube를 참조)
sonar.host.url=http://localhost:9000

# 커버리지 경로 (Pytest 결과로 생성되는 파일 이름과 일치해야 함)
sonar.python.coverage.reportPaths=coverage.xml

# html 내부의 js 코드도 분석에서 제외
sonar.exclusions=**/*.js,**/*.css,**/*.html
